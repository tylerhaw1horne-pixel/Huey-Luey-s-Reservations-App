<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huey Luey's – Data Recovery</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #f6f1e8; color: #1f2937; padding: 24px; }
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
.card { background: #fff; border-radius: 14px; border: 2px solid rgba(30,127,79,0.15); padding: 28px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 14px rgba(0,0,0,0.09); }
h1 { font-size: 20px; font-weight: 800; color: #1e7f4f; margin-bottom: 6px; }
p { font-size: 13px; color: #6b7280; font-weight: 600; margin-bottom: 20px; line-height: 1.6; }
.result { background: #eaf4ee; border: 2px solid #9dcfb4; border-radius: 9px; padding: 14px 16px; margin-top: 16px; font-size: 13px; font-weight: 700; color: #16643e; line-height: 1.8; display: none; }
.result.error { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }
.btn {
  background: #1e7f4f; border: none; border-radius: 9px; color: #fff;
  font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 800;
  padding: 14px 28px; cursor: pointer; width: 100%; transition: background 0.15s;
}
.btn:hover { background: #16643e; }
.btn.org { background: #d35400; margin-top: 10px; }
.btn.org:hover { background: #e8651a; }
.key-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #e2d8cc; font-size: 13px; }
.key-row:last-child { border-bottom: none; }
.key-name { font-weight: 800; color: #1f2937; min-width: 200px; }
.key-cnt { font-weight: 600; color: #6b7280; }
.key-cnt.found { color: #1e7f4f; font-weight: 800; }
</style>
</head>
<body>
<div class="card">
  <h1>&#128190; Reservation Data Recovery</h1>
  <p>This tool scans all old storage keys from previous versions of the app and merges any found reservations into the current key (<strong>hl_res_v3</strong>). Run this once on the same device/browser where reservations were entered.</p>

  <div id="scan-results" style="margin-bottom:16px;display:none;">
    <div style="font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#d35400;margin-bottom:8px;">Storage Keys Found:</div>
    <div id="key-list"></div>
  </div>

<button class="btn" onclick="scanAndMigrate()">🔎 Scan & Migrate All Data</button>
<button class="btn org" onclick="goToApp()" style="display:none;" id="go-btn">→ Go to Reservation App</button>

  <div class="result" id="result"></div>
</div>

<script>
var OLD_KEYS = [
  'hlres3',
  'hl_reservations_v2',
  'hl_reservations_v3',
  'hl_res_v2',
  'hl_res_v1',
  'hueylueys_reservations',
  'reservations'
];
var CURRENT_KEY = 'hl_res_v3';

function scanAndMigrate() {
  var keyList = document.getElementById('key-list');
  var scanDiv = document.getElementById('scan-results');
  var resultDiv = document.getElementById('result');
  keyList.innerHTML = '';
  scanDiv.style.display = 'block';

  var currentData = [];
  try { currentData = JSON.parse(localStorage.getItem(CURRENT_KEY) || '[]'); } catch(e) { currentData = []; }
  var currentIds = {};
  currentData.forEach(function(r) { currentIds[r.id] = true; });

  var totalFound = 0;
  var totalMerged = 0;
  var keysWithData = [];

  OLD_KEYS.forEach(function(key) {
    var raw = localStorage.getItem(key);
    var count = 0;
    var merged = 0;
    if (raw) {
      try {
        var data = JSON.parse(raw);
        if (Array.isArray(data) && data.length > 0) {
          count = data.length;
          keysWithData.push(key);
          data.forEach(function(r) {
            if (r && r.id && !currentIds[r.id] && r.name) {
              currentData.push(r);
              currentIds[r.id] = true;
              merged++;
              totalMerged++;
            }
          });
          totalFound += count;
        }
      } catch(e) {}
    }

    var row = document.createElement('div');
    row.className = 'key-row';
    row.innerHTML = '<span class="key-name">' + key + '</span>'
      + '<span class="key-cnt' + (count > 0 ? ' found' : '') + '">'
      + (count > 0 ? '&#10003; ' + count + ' reservation' + (count !== 1 ? 's' : '') + (merged > 0 ? ' (' + merged + ' merged)' : ' (already current)') : 'Empty')
      + '</span>';
    keyList.appendChild(row);
  });

  // Also show current key
  var curRow = document.createElement('div');
  curRow.className = 'key-row';
  curRow.innerHTML = '<span class="key-name" style="color:#1e7f4f;">hl_res_v3 (current)</span>'
    + '<span class="key-cnt found">&#10003; ' + currentData.length + ' total after merge</span>';
  keyList.appendChild(curRow);

  // Save merged data
  localStorage.setItem(CURRENT_KEY, JSON.stringify(currentData));

  resultDiv.style.display = 'block';
  resultDiv.className = 'result';

  if (totalMerged > 0) {
    resultDiv.innerHTML = '&#10003; Migration complete!<br>'
      + 'Found <strong>' + totalFound + '</strong> reservation' + (totalFound !== 1 ? 's' : '') + ' across old keys.<br>'
      + 'Merged <strong>' + totalMerged + '</strong> new reservation' + (totalMerged !== 1 ? 's' : '') + ' into current storage.<br>'
      + 'Total in app now: <strong>' + currentData.length + '</strong> reservation' + (currentData.length !== 1 ? 's' : '') + '.';
  } else if (totalFound > 0) {
    resultDiv.innerHTML = '&#10003; All existing data was already in the current version.<br>'
      + 'Found <strong>' + totalFound + '</strong> reservation' + (totalFound !== 1 ? 's' : '') + ' — all already present.<br>'
      + 'Total in app: <strong>' + currentData.length + '</strong> reservation' + (currentData.length !== 1 ? 's' : '') + '.';
  } else {
    resultDiv.innerHTML = 'No reservations found in any old storage keys.<br>Your current app has <strong>' + currentData.length + '</strong> reservation' + (currentData.length !== 1 ? 's' : '') + '.';
  }

  document.getElementById('go-btn').style.display = 'block';
}

function goToApp() {
  window.location.href = 'https://hueylueysacwreserve.vercel.app';
}
</script>

</body>
</html>
